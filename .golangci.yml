version: "2"
linters:
  enable:
  - errcheck
  - goconst
  - gosec
  - govet
  - ineffassign
  - lll
  - misspell
  - nakedret
  - unconvert
  exclusions:
    paths:
    - schema.go
    - pulumiManifest.go
formatters:
  enable:
  - gofmt
  exclusions:
    paths:
    - schema.go
    - pulumiManifest.go
run:
  timeout: 20m
  
